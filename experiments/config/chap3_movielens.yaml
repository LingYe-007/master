# Chapter 3 — MovieLens-1M default experiment (tab:exp_config_chap3)
experiment_id: c3_movielens_default
chapter: 3
dataset: movielens-1m

federated:
  num_clients: 50
  dirichlet_alpha: 1.0
  participation_rate: 0.2
  global_rounds: 100
  local_epochs: 5

training:
  seed: 42
  lr: 0.001
  optimizer: adam
  embed_dim: 64
  batch_size: 256
  num_neg: 1

data:
  min_rating: 4.0

fedascl:
  attr_knn: 10
  tau_cl: 0.2
  tau_proto: 0.5
  lambda_cl: 0.1
  lambda_proto: 0.1

evaluation:
  metrics: [hit@10, ndcg@10, hit@20, ndcg@20]
  eval_every: 5

paths:
  data_raw: data/raw
  data_processed: data/processed
  results: results
